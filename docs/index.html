<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尚艺设计 SyDesign - 创意设计工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            text-align: left;
        }
        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }
        .feature h3 {
            color: #667eea;
            margin-bottom: 8px;
        }
        .github-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            transition: transform 0.3s;
        }
        .github-link:hover {
            transform: scale(1.05);
        }
        footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 尚艺设计</h1>
        <p class="subtitle">专业的创意设计工作室 | SyDesign Creative Studio</p>
        
        <div class="features">
            <div class="feature">
                <h3>🎨 品牌视觉</h3>
                <p>品牌视觉识别系统设计，打造独特品牌形象</p>
            </div>
            <div class="feature">
                <h3>🌐 网站设计</h3>
                <p>响应式网站设计与开发，适配所有设备</p>
            </div>
            <div class="feature">
                <h3>📱 UI/UX 设计</h3>
                <p>用户界面与体验设计，提升产品价值</p>
            </div>
            <div class="feature">
                <h3>🖼️ 数字创意</h3>
                <p>海报、宣传物料、数字媒体创意设计</p>
            </div>
        </div>
        
        <a href="https://github.com/sydesign007/sydesign" class="github-link">View on GitHub</a>
        
        <footer>
            © 2026 尚艺设计 (SyDesign). All rights reserved.<br>
            📧 contact@sydesign.com
        </footer>
    </div>
</body>
</html>
